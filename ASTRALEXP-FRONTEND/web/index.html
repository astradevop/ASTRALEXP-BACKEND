<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <!-- Full desktop viewport — no mobile scaling forced -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Theme / PWA meta -->
    <meta name="theme-color" content="#111417" />
    <meta name="description" content="AstralExp — The Digital Private Vault. AI-powered expense management." />
    <meta name="application-name" content="AstralExp" />
    <meta name="apple-mobile-web-app-title" content="AstralExp" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AstralExp — Digital Private Vault" />
    <meta property="og:description" content="Intelligent expense tracking with AI-powered chat logging and shared vault management." />
    <meta property="og:image" content="%PUBLIC_URL%/assets/icon.png" />

    <title>AstralExp</title>

    <!-- Global web styles -->
    <link rel="stylesheet" href="/web/index.css" />

    <!-- Preconnect to Google Fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Inter font — premium, clean, modern -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Inline critical: ensure body uses Inter */
      * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif !important; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run AstralExp.</noscript>
  </body>
</html>
