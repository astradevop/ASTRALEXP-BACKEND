name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ASTRALEXP-FRONTEND/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ASTRALEXP-FRONTEND

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: ASTRALEXP-FRONTEND/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android-release-key.jks

      - name: Create Credentials JSON
        run: |
          echo '{
            "android": {
              "keystore": {
                "keystorePath": "android-release-key.jks",
                "keystorePassword": "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}",
                "keyAlias": "${{ secrets.ANDROID_KEY_ALIAS }}",
                "keyPassword": "${{ secrets.ANDROID_KEY_PASSWORD }}"
              }
            }
          }' > credentials.json

      - name: Build APK locally
        run: eas build -p android --profile production --local --non-interactive
        env:
          EAS_NO_VCS: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: astralexp-apk
          path: ASTRALEXP-FRONTEND/*.apk
