        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-depth-shift {
            background: linear-gradient(180deg, rgba(17, 20, 23, 0) 0%, rgba(25, 28, 31, 1) 100%);
        }
        .ambient-glow {
            box-shadow: 0 0 80px -20px rgba(63, 81, 181, 0.15);
        }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface font-body selection:bg-primary/30">
<!-- Splash Screen Wrapper -->
<main class="relative min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Environmental Background Effects -->
<div class="absolute inset-0 z-0">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-tertiary-container/5 blur-[120px] rounded-full"></div>
</div>
<!-- Center Content Branding -->
<div class="relative z-10 flex flex-col items-center">
<!-- Sleek Minimalist Logo Container -->
<div class="mb-8 p-6 rounded-xl bg-surface-container-high ambient-glow border border-outline-variant/5">
<span class="material-symbols-outlined text-6xl text-primary-container" style="font-variation-settings: 'FILL' 1; font-size: 64px;">
                    account_balance_wallet
                </span>
</div>
<!-- Brand Name -->
<h1 class="font-headline font-extrabold text-4xl md:text-5xl tracking-tighter text-on-surface">
                NeoLedger
            </h1>
<!-- Minimal Tagline -->
<p class="mt-4 font-body text-on-surface-variant text-sm tracking-widest uppercase opacity-60">
                Financial Fluidity
            </p>
</div>
<!-- Bottom Loading/Entry Indicator (Minimalist) -->
<div class="absolute bottom-16 flex flex-col items-center gap-4">
<div class="h-1 w-12 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full w-1/2 bg-primary-container rounded-full"></div>
</div>
<span class="text-[10px] font-label text-on-surface-variant/40 tracking-[0.2em] uppercase">
                Initializing Vault
            </span>
</div>
</main>
<!-- Shell Suppression Notice: This is a Splash/Transactional screen, 
         therefore TopAppBar and BottomNavBar are suppressed per "The Destination Rule" 
         and "The UX Goal" in the provided Brand Anchors. -->
