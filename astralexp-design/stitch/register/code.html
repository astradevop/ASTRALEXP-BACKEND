<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-tint": "#bac3ff",
              "error-container": "#93000a",
              "on-tertiary": "#00390a",
              "on-tertiary-container": "#83e881",
              "on-surface": "#e1e2e7",
              "primary-container": "#3f51b5",
              "on-secondary-container": "#adb2df",
              "on-error": "#690005",
              "on-primary-fixed-variant": "#293ca0",
              "surface-variant": "#323538",
              "on-primary-fixed": "#00105c",
              "on-tertiary-fixed": "#002204",
              "secondary-fixed-dim": "#bec4f2",
              "outline-variant": "#454652",
              "secondary-container": "#3e446b",
              "surface-container": "#1d2023",
              "on-primary": "#08218a",
              "primary": "#bac3ff",
              "on-primary-container": "#cacfff",
              "error": "#ffb4ab",
              "surface-container-highest": "#323538",
              "background": "#111417",
              "tertiary-container": "#00691b",
              "surface-container-low": "#191c1f",
              "on-surface-variant": "#c5c5d4",
              "surface-container-high": "#272a2e",
              "surface-container-lowest": "#0b0e11",
              "surface": "#111417",
              "tertiary-fixed-dim": "#78dc77",
              "on-tertiary-fixed-variant": "#005313",
              "secondary-fixed": "#dee0ff",
              "secondary": "#bec4f2",
              "surface-bright": "#37393d",
              "tertiary": "#78dc77",
              "on-background": "#e1e2e7",
              "surface-dim": "#111417",
              "on-error-container": "#ffdad6",
              "primary-fixed": "#dee0ff",
              "on-secondary": "#272e53",
              "inverse-primary": "#4355b9",
              "inverse-on-surface": "#2e3134",
              "tertiary-fixed": "#94f990",
              "outline": "#8f909e",
              "inverse-surface": "#e1e2e7",
              "primary-fixed-dim": "#bac3ff",
              "on-secondary-fixed-variant": "#3e446b",
              "on-secondary-fixed": "#12183d"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            backdrop-filter: blur(24px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary/30">
<!-- Background Decorative Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary-container/10 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[50%] h-[50%] bg-on-secondary/5 rounded-full blur-[120px]"></div>
</div>
<!-- Main Registration Container -->
<main class="w-full max-w-[480px] z-10">
<!-- Brand Header -->
<header class="text-center mb-12">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-primary to-primary-container mb-6 shadow-[0_8px_32px_rgba(63,81,181,0.2)]">
<span class="material-symbols-outlined text-white text-3xl" data-weight="fill">account_balance_wallet</span>
</div>
<h1 class="font-headline font-black text-4xl tracking-tight text-on-surface mb-2">NeoLedger</h1>
<p class="text-on-surface-variant font-medium tracking-wide">Enter the Digital Private Vault</p>
</header>
<!-- Registration Card -->
<section class="bg-surface-container-low p-10 rounded-xl shadow-2xl relative overflow-hidden">
<!-- Subtle Tonal Accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary/50 to-transparent"></div>
<form class="space-y-8">
<div class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-2" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant transition-colors group-focus-within:text-primary">mail</span>
<input class="w-full bg-surface-container-lowest border-none rounded-md py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary-container/50 transition-all outline-none" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-2" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant transition-colors group-focus-within:text-primary">lock</span>
<input class="w-full bg-surface-container-lowest border-none rounded-md py-4 pl-12 pr-12 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary-container/50 transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-2" for="confirm_password">Confirm Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant transition-colors group-focus-within:text-primary">enhanced_encryption</span>
<input class="w-full bg-surface-container-lowest border-none rounded-md py-4 pl-12 pr-12 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary-container/50 transition-all outline-none" id="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Terms Notice -->
<p class="text-[11px] text-on-surface-variant leading-relaxed text-center px-4">
                    By creating an account, you agree to our 
                    <a class="text-primary hover:underline font-medium" href="#">Terms of Service</a> and 
                    <a class="text-primary hover:underline font-medium" href="#">Privacy Policy</a>.
                </p>
<!-- Action Button -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-full shadow-[0_8px_24px_rgba(63,81,181,0.15)] hover:shadow-[0_12px_32px_rgba(63,81,181,0.25)] active:scale-95 transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
</section>
<!-- Footer Actions -->
<footer class="mt-10 text-center">
<p class="text-on-surface-variant font-medium">
                Already have an account? 
                <a class="text-primary hover:text-surface-tint font-bold transition-colors ml-1" href="#">Log in here</a>
</p>
</footer>
</main>
<!-- Visual Polish: Decorative Tonal Card in Background -->
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-surface-container-lowest rounded-full -z-10 opacity-20 blur-3xl"></div>
</body></html>
