<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NeoLedger - Edit Expense</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-tint": "#bac3ff",
                        "error-container": "#93000a",
                        "on-tertiary": "#00390a",
                        "on-tertiary-container": "#83e881",
                        "on-surface": "#e1e2e7",
                        "primary-container": "#3f51b5",
                        "on-secondary-container": "#adb2df",
                        "on-error": "#690005",
                        "on-primary-fixed-variant": "#293ca0",
                        "surface-variant": "#323538",
                        "on-primary-fixed": "#00105c",
                        "on-tertiary-fixed": "#002204",
                        "secondary-fixed-dim": "#bec4f2",
                        "outline-variant": "#454652",
                        "secondary-container": "#3e446b",
                        "surface-container": "#1d2023",
                        "on-primary": "#08218a",
                        "primary": "#bac3ff",
                        "on-primary-container": "#cacfff",
                        "error": "#ffb4ab",
                        "surface-container-highest": "#323538",
                        "background": "#111417",
                        "tertiary-container": "#00691b",
                        "surface-container-low": "#191c1f",
                        "on-surface-variant": "#c5c5d4",
                        "surface-container-high": "#272a2e",
                        "surface-container-lowest": "#0b0e11",
                        "surface": "#111417",
                        "tertiary-fixed-dim": "#78dc77",
                        "on-tertiary-fixed-variant": "#005313",
                        "secondary-fixed": "#dee0ff",
                        "secondary": "#bec4f2",
                        "surface-bright": "#37393d",
                        "tertiary": "#78dc77",
                        "on-background": "#e1e2e7",
                        "surface-dim": "#111417",
                        "on-error-container": "#ffdad6",
                        "primary-fixed": "#dee0ff",
                        "on-secondary": "#272e53",
                        "inverse-primary": "#4355b9",
                        "inverse-on-surface": "#2e3134",
                        "tertiary-fixed": "#94f990",
                        "outline": "#8f909e",
                        "inverse-surface": "#e1e2e7",
                        "primary-fixed-dim": "#bac3ff",
                        "on-secondary-fixed-variant": "#3e446b",
                        "on-secondary-fixed": "#12183d"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .tonal-depth-shift {
            background: linear-gradient(180deg, rgba(17, 20, 23, 0.9) 0%, rgba(17, 20, 23, 0.6) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30 min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/60 dark:bg-[#111417]/60 backdrop-blur-2xl flex items-center justify-between px-10 py-4 w-full">
<div class="flex items-center gap-4">
<button class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-[#37393D]/50 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="font-manrope font-bold text-2xl tracking-tight text-[#BAC3FF]">Financial Fluidity</h1>
</div>
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="professional headshot of a person with friendly expression in soft studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBuMdHFOkOikrTL93mTp1ll1znR0b5FChfpnsFOVCZwh4en7JqYIYSgajQNPiuGcpFZRBaZ7xITcU46Tqoqa8PoKq_V6x2XGXDpQibNSaYX77pRCyBDXau55EJnlyjhRt2LqXSDnBxEId1kV7ilNK9tigQtyn6KaPPK-t9nb_et8aTQ8V7QmK8o4rM4FMVBfoZGF73F9zUcIvj7hS3YTNQbnbS0BFSsp737PSF3mmc2TT2OIP5klbyOPa_ouLTONZKwN24t7lu3LVgZ"/>
</div>
</div>
</header>
<main class="pt-28 px-6 md:px-10 max-w-2xl mx-auto">
<!-- Form Header -->
<div class="mb-10 text-center">
<span class="text-on-surface-variant font-label uppercase tracking-widest text-[10px]">Transaction Details</span>
<h2 class="font-headline font-extrabold text-4xl mt-2 tracking-tight">Edit Expense</h2>
</div>
<!-- Expense Form -->
<form class="space-y-8">
<!-- Amount Input (The Hero) -->
<div class="bg-surface-container-lowest rounded-xl p-8 flex flex-col items-center justify-center">
<label class="text-on-surface-variant font-medium text-sm mb-2">Total Amount</label>
<div class="flex items-center">
<span class="font-headline font-bold text-4xl text-primary mr-2">$</span>
<input class="bg-transparent border-none text-center font-headline font-black text-6xl focus:ring-0 placeholder:text-surface-variant w-full max-w-[280px]" placeholder="0.00" step="0.01" type="number" value="124.50"/>
</div>
</div>
<!-- Main Form Content -->
<div class="space-y-6">
<!-- Category Section -->
<div class="space-y-3">
<label class="px-4 text-xs font-bold uppercase tracking-widest text-on-surface-variant">Category</label>
<div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
<button class="bg-surface-container-high p-4 rounded-xl flex flex-col items-center gap-2 hover:bg-surface-bright transition-all active:scale-95 ring-2 ring-primary" type="button">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">restaurant</span>
<span class="text-sm font-medium">Dining</span>
</button>
<button class="bg-surface-container-low p-4 rounded-xl flex flex-col items-center gap-2 hover:bg-surface-bright transition-all active:scale-95" type="button">
<span class="material-symbols-outlined text-on-surface-variant">shopping_cart</span>
<span class="text-sm font-medium">Groceries</span>
</button>
<button class="bg-surface-container-low p-4 rounded-xl flex flex-col items-center gap-2 hover:bg-surface-bright transition-all active:scale-95" type="button">
<span class="material-symbols-outlined text-on-surface-variant">directions_car</span>
<span class="text-sm font-medium">Transport</span>
</button>
<button class="bg-surface-container-low p-4 rounded-xl flex flex-col items-center gap-2 hover:bg-surface-bright transition-all active:scale-95" type="button">
<span class="material-symbols-outlined text-on-surface-variant">home</span>
<span class="text-sm font-medium">Housing</span>
</button>
<button class="bg-surface-container-low p-4 rounded-xl flex flex-col items-center gap-2 hover:bg-surface-bright transition-all active:scale-95" type="button">
<span class="material-symbols-outlined text-on-surface-variant">theater_comedy</span>
<span class="text-sm font-medium">Leisure</span>
</button>
<button class="bg-surface-container-low p-4 rounded-xl flex flex-col items-center gap-2 hover:bg-surface-bright transition-all active:scale-95" type="button">
<span class="material-symbols-outlined text-on-surface-variant">more_horiz</span>
<span class="text-sm font-medium">Other</span>
</button>
</div>
</div>
<!-- Fields Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Date Picker -->
<div class="space-y-3">
<label class="px-4 text-xs font-bold uppercase tracking-widest text-on-surface-variant">Date &amp; Time</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">calendar_today</span>
<input class="w-full bg-surface-container-low border-none rounded-full py-4 pl-12 pr-6 focus:ring-2 focus:ring-primary/20 text-on-surface" type="datetime-local" value="2023-10-27T19:30"/>
</div>
</div>
<!-- Payment Method -->
<div class="space-y-3">
<label class="px-4 text-xs font-bold uppercase tracking-widest text-on-surface-variant">Payment Method</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">account_balance_wallet</span>
<select class="w-full bg-surface-container-low border-none rounded-full py-4 pl-12 pr-10 focus:ring-2 focus:ring-primary/20 appearance-none text-on-surface">
<option>Neo Platinum Card (••92)</option>
<option>Digital Vault</option>
<option>Business Savings</option>
<option>Cash</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
</div>
<!-- Notes Section -->
<div class="space-y-3">
<label class="px-4 text-xs font-bold uppercase tracking-widest text-on-surface-variant">Description &amp; Notes</label>
<textarea class="w-full bg-surface-container-lowest border-none rounded-xl p-6 focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-surface-variant resize-none" placeholder="Add a memo for this transaction..." rows="3">Dinner at 'The Indigo Lounge' with the product team.</textarea>
</div>
<!-- Attachment (Stylized Chip) -->
<div class="flex items-center gap-4 px-2">
<button class="flex items-center gap-2 bg-surface-container-low hover:bg-surface-bright py-2 px-4 rounded-full transition-colors" type="button">
<span class="material-symbols-outlined text-sm">attach_file</span>
<span class="text-sm font-medium text-on-surface-variant">Attach Receipt</span>
</button>
<div class="h-1 w-1 bg-surface-variant rounded-full"></div>
<span class="text-xs text-on-surface-variant">Max 5MB (JPG, PDF)</span>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-6 space-y-4">
<button class="w-full py-5 rounded-full bg-gradient-to-br from-[#BAC3FF] to-[#3F51B5] text-white font-manrope font-bold text-lg shadow-[0_8px_30px_rgba(63,81,181,0.2)] active:scale-95 transition-transform" type="submit">
                    Save Transaction
                </button>
<button class="w-full py-4 text-on-surface-variant font-medium hover:text-error transition-colors" type="button">
                    Delete Expense
                </button>
</div>
</form>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-[3rem] bg-[#111417]/80 backdrop-blur-3xl shadow-[0_-8px_40px_rgba(63,81,181,0.08)]">
<div class="flex justify-around items-center px-6 pb-6 pt-3 w-full">
<a class="flex flex-col items-center justify-center text-[#C5C5D4] p-3 hover:text-white transition-all active:scale-90 transform transition-transform" href="#">
<span class="material-symbols-outlined">chat_bubble</span>
<span class="font-inter font-medium text-[10px] uppercase tracking-widest mt-1">Chat</span>
</a>
<a class="flex flex-col items-center justify-center bg-gradient-to-br from-[#BAC3FF] to-[#3F51B5] text-white rounded-full p-3 mb-1 active:scale-90 transform transition-transform" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
<span class="font-inter font-medium text-[10px] uppercase tracking-widest mt-1">Expenses</span>
</a>
<a class="flex flex-col items-center justify-center text-[#C5C5D4] p-3 hover:text-white transition-all active:scale-90 transform transition-transform" href="#">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="font-inter font-medium text-[10px] uppercase tracking-widest mt-1">Payments</span>
</a>
<a class="flex flex-col items-center justify-center text-[#C5C5D4] p-3 hover:text-white transition-all active:scale-90 transform transition-transform" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-inter font-medium text-[10px] uppercase tracking-widest mt-1">Profile</span>
</a>
</div>
</nav>
</body></html>
